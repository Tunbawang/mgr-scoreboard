<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スコアラー操作画面 - MARTIAL GRAPPLING RULES</title>
<style>
  *{box-sizing:border-box;}
  html,body{ margin:0; padding:0; background:#d6d6d6; color:#000;
    font-family:"Yu Gothic","Hiragino Kaku Gothic ProN",Arial,sans-serif; }
  .num{ font-family:Arial,"Yu Gothic",sans-serif; font-weight:700; }
  #wrap{ padding:16px; max-width:1100px; margin:0 auto; }
  .topbar{ display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; gap:10px; }
  .topbar h1{ font-size:15px; letter-spacing:.08em; color:#333; font-weight:700; margin:0; white-space:nowrap; }
  .matchBadge{
    font-size:15px; font-weight:700; color:#333; background:#FFFF00; border:1px solid #999;
    border-radius:2px; padding:6px 14px; white-space:nowrap;
  }
  .topbar .links{ display:flex; gap:8px; }
  .topbar a{
    display:inline-block; border:1px solid #999; color:#333; text-decoration:none;
    background:#e2e2e2; padding:8px 14px; border-radius:2px; font-size:12px; white-space:nowrap;
  }
  .topbar a:hover{ background:#cfcfcf; }

  .player-block{ border:1px solid #999; border-radius:2px; padding:10px; margin-bottom:12px; background:#e2e2e2; }
  .player-head{ display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  .nameBlock{ display:flex; flex-direction:column; gap:2px; }
  .nameBlock input{
    background:#fff; border:1px solid #ccc; color:#000;
    padding:4px 6px; width:260px;
  }
  .nameBlock input.nameInput{ font-size:16px; font-weight:700; }
  .nameBlock input.academyInput{ font-size:12px; font-weight:400; color:#444; }
  .player-total{ margin-left:auto; font-size:34px; padding:2px 18px; border:1px solid #999; background:#cfcfcf; }
  .cat-grid{ display:grid; grid-template-columns:repeat(5,1fr); gap:6px; }
  .cat{ border:1px solid #999; padding:6px; text-align:center; background:#cfcfcf; }
  .cat .label{ font-size:11px; font-weight:700; margin-bottom:4px; }
  .cat .score{ font-size:28px; font-weight:700; margin-bottom:6px; padding:4px 0; border:1px solid #ccc; }
  .cat .btns{ display:flex; gap:6px; justify-content:center; }
  .cat button{
    flex:1; padding:7px 0; border:1px solid #8a8a8a; border-radius:2px; cursor:pointer;
    font-size:13px; font-weight:700; background:#c4c4c4; color:#000;
  }
  .cat button:hover{ background:#b0b0b0; }
  .cat button:active{ background:#999999; }

  .controls{ display:flex; gap:12px; align-items:stretch; margin-top:6px; flex-wrap:wrap; }
  .timerBox{ border:1px solid #999; padding:14px 22px; text-align:center; min-width:150px; background:#FFFF00; }
  .timerBox .display{ font-size:40px; font-weight:700; }
  .timerBox.alert{ background:#EB0000; }
  .timerBox.alert .display{ color:#FFFF00; }
  .startstop{
    flex:1; min-width:170px; background:#FFFF00; color:#000; border:1px solid #999;
    font-size:18px; font-weight:700; letter-spacing:.05em; cursor:pointer;
  }
  .startstop:active{ background:#e6e600; }
  .sidebtns{ display:flex; flex-direction:column; gap:8px; min-width:160px; }
  .sidebtns button{
    background:#FFFF00; border:1px solid #999; color:#000;
    padding:9px; border-radius:2px; cursor:pointer; font-size:12px;
  }
  .swapRow{ display:flex; gap:8px; }
  .swapRow button.swap{ flex:0 0 48px; font-size:16px; background:#FFFF00; }

  @media (max-width:800px){
    .nameBlock input{ width:150px; }
    .nameBlock input.nameInput{ font-size:14px; }
    .player-total{ font-size:24px; }
    .cat .score{ font-size:20px; }
  }
</style>
</head>
<body>
<div id="wrap">
  <div class="topbar">
    <h1>MARTIAL GRAPPLING RULES ー スコアラー操作画面</h1>
    <div class="matchBadge" id="matchBadge">MATCH 1</div>
    <div class="links">
      <a href="roster.html" target="_blank" rel="noopener">選手名簿を開く ▸</a>
      <a href="display.html" target="_blank" rel="noopener">観客表示を新しいタブで開く ▸</a>
    </div>
  </div>

  <div class="player-block" data-player="0">
    <div class="player-head">
      <div class="nameBlock">
        <input type="text" class="nameInput" data-player="0" value="JIROU YAMADA">
        <input type="text" class="academyInput" data-player="0" placeholder="道場名" value="">
      </div>
      <div class="player-total num" data-player="0">0</div>
    </div>
    <div class="cat-grid"></div>
  </div>

  <div class="player-block" data-player="1">
    <div class="player-head">
      <div class="nameBlock">
        <input type="text" class="nameInput" data-player="1" value="BAN MOROBOSHI">
        <input type="text" class="academyInput" data-player="1" placeholder="道場名" value="">
      </div>
      <div class="player-total num" data-player="1">0</div>
    </div>
    <div class="cat-grid"></div>
  </div>

  <div class="controls">
    <div class="timerBox" id="timerBox">
      <div class="display num" id="timerDisplay">3:00</div>
    </div>
    <button class="startstop" id="startStopBtn">START / STOP</button>
    <div class="sidebtns">
      <button id="timeResetBtn">TIME RESETTING</button>
      <div class="swapRow">
        <button id="scoreResetBtn" style="flex:1;">SCORE RESETTING</button>
        <button class="swap" id="scoreSwapBtn">⇔</button>
      </div>
    </div>
  </div>
</div>

<script>
const CATS = [
  { key:"escape", label:"ESCAPE", delta:3, cls:"escape" },
  { key:"shiho",  label:"SHIHO",  delta:2, cls:"shiho" },
  { key:"mount",  label:"MOUNT",  delta:3, cls:"mount" },
  { key:"turtle", label:"TURTLE", delta:4, cls:"turtle" },
  { key:"strike", label:"STRIKE", delta:1, cls:"strike" },
];
const STORE_KEY = "mgr_scoreboard_state_v1";

function defaultState(){
  const player = () => ({ escape:0, shiho:0, mount:0, turtle:0, strike:0 });
  return {
    names: [{name:"JIROU YAMADA", academy:""}, {name:"BAN MOROBOSHI", academy:""}],
    players: [player(), player()],
    backup: [player(), player()],
    durationSec: 180,
    remainingSec: 180,
    timerState: 0,
    matchNumber: 1
  };
}
function normalizeState(s){
  // 過去バージョン（namesが文字列の配列だった場合）との互換性維持
  s.names = s.names.map(n => (typeof n === "string") ? {name:n, academy:""} : n);
  if(typeof s.matchNumber !== "number") s.matchNumber = 1;
  return s;
}
function loadState(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(!raw) return defaultState();
    const s = JSON.parse(raw);
    if(!s.players || !s.names) return defaultState();
    return normalizeState(s);
  }catch(e){ return defaultState(); }
}
function saveState(s){ localStorage.setItem(STORE_KEY, JSON.stringify(s)); }

let state = loadState();
let tickHandle = null;

function total(p){ return p.escape + p.shiho + p.mount + p.turtle + p.strike; }
function fmt(sec){
  sec = Math.max(0, sec);
  const m = Math.floor(sec/60), s = sec%60;
  return m + ":" + String(s).padStart(2,"0");
}

/* 色はJSから直接指定する（CSSの詳細度に左右されないため）
   観客表示と同じ配色: ESCAPE・STRIKEも選手ごとに色味を変える */
const ROW_BASE   = ["#6EC8F5", "#FFFFFF"]; // [プレイヤー1(青側), プレイヤー2(白側)]
const ROW_ESCAPE = ["#00B050", "#92D050"];
const ROW_STRIKE = ["#C00000", "#FF0000"];
function catColor(p, key){
  if(key === "escape") return ROW_ESCAPE[p];
  if(key === "strike") return ROW_STRIKE[p];
  return ROW_BASE[p]; // shiho / mount / turtle
}

function buildCatGrids(){
  document.querySelectorAll(".cat-grid").forEach(grid=>{
    const p = grid.closest(".player-block").dataset.player;
    grid.innerHTML = CATS.map(c => `
      <div class="cat ${c.cls}">
        <div class="label">${c.label}</div>
        <div class="score num" data-player="${p}" data-cat="${c.key}" style="background:${catColor(p, c.key)};">0</div>
        <div class="btns">
          <button class="minus" data-player="${p}" data-cat="${c.key}" data-delta="${-c.delta}">-${c.delta}</button>
          <button class="plus" data-player="${p}" data-cat="${c.key}" data-delta="${c.delta}">+${c.delta}</button>
        </div>
      </div>
    `).join("");
  });
}

function render(){
  document.querySelectorAll(".nameInput").forEach(el=>{
    el.value = state.names[el.dataset.player].name;
    el.style.background = ROW_BASE[el.dataset.player];
  });
  document.querySelectorAll(".academyInput").forEach(el=>{
    el.value = state.names[el.dataset.player].academy;
    el.style.background = ROW_BASE[el.dataset.player];
  });
  document.getElementById("matchBadge").textContent = "MATCH " + state.matchNumber;
  [0,1].forEach(p=>{
    CATS.forEach(c=>{
      const el = document.querySelector(`.score[data-player="${p}"][data-cat="${c.key}"]`);
      if(el) el.textContent = state.players[p][c.key];
    });
    document.querySelector(`.player-total[data-player="${p}"]`).textContent = total(state.players[p]);
  });
  document.getElementById("timerDisplay").textContent = fmt(state.remainingSec);
  document.getElementById("timerBox").classList.toggle("alert", state.timerState === 2);
}

function persistAndRender(){ saveState(state); render(); }

function startTicking(){
  stopTicking();
  tickHandle = setInterval(()=>{
    if(state.timerState !== 1) return;
    state.remainingSec -= 1;
    if(state.remainingSec <= 0){
      state.remainingSec = 0;
      state.timerState = 2;
      persistAndRender();
      return;
    }
    persistAndRender();
  }, 1000);
}
function stopTicking(){ if(tickHandle){ clearInterval(tickHandle); tickHandle = null; } }

function onStartStop(){
  switch(state.timerState){
    case 0: state.timerState = 1; startTicking(); break;
    case 1: state.timerState = 0; stopTicking(); break;
    case 2: state.timerState = 3; state.remainingSec = state.durationSec; break;
    case 3: state.timerState = 1; state.remainingSec = state.durationSec; startTicking(); break;
  }
  persistAndRender();
}

function onTimeReset(){
  const cur = fmt(state.durationSec);
  const ans = prompt("試合時間を「分:秒」で入力してください（例 3:00）", cur);
  if(ans === null || ans.trim() === "") return;
  let m=0, s=0;
  if(ans.includes(":")){
    const parts = ans.split(":");
    m = parseInt(parts[0],10) || 0;
    s = parseInt(parts[1],10) || 0;
  } else { m = parseInt(ans,10) || 0; }
  state.durationSec = m*60 + s;
  state.remainingSec = state.durationSec;
  state.timerState = 0;
  stopTicking();
  persistAndRender();
}

function onScoreReset(){
  state.backup = JSON.parse(JSON.stringify(state.players));
  state.players.forEach(p=>{ CATS.forEach(c=> p[c.key] = 0); });
  persistAndRender();
}
function onScoreSwap(){
  const tmp = state.players;
  state.players = state.backup;
  state.backup = tmp;
  persistAndRender();
}

buildCatGrids();

document.addEventListener("click", (e)=>{
  const btn = e.target.closest(".cat button");
  if(btn){
    const p = btn.dataset.player, cat = btn.dataset.cat, delta = parseInt(btn.dataset.delta,10);
    let v = state.players[p][cat] + delta;
    if(v < 0) v = 0;
    state.players[p][cat] = v;
    persistAndRender();
  }
});
document.querySelectorAll(".nameInput").forEach(inp=>{
  inp.addEventListener("input", ()=>{
    state.names[inp.dataset.player].name = inp.value;
    persistAndRender();
  });
});
document.querySelectorAll(".academyInput").forEach(inp=>{
  inp.addEventListener("input", ()=>{
    state.names[inp.dataset.player].academy = inp.value;
    persistAndRender();
  });
});
document.getElementById("startStopBtn").addEventListener("click", onStartStop);
document.getElementById("timeResetBtn").addEventListener("click", onTimeReset);
document.getElementById("scoreResetBtn").addEventListener("click", onScoreReset);
document.getElementById("scoreSwapBtn").addEventListener("click", onScoreSwap);

render();
if(state.timerState === 1) startTicking();
setInterval(()=>{
  const fresh = loadState();
  if(state.timerState !== 1){ state = fresh; }
  render();
}, 500);
</script>
</body>
</html>
